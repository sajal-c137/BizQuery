services:

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env.docker
    volumes:
      - sqlite_data:/app/data
      - chroma_data:/app/chroma_db
      - upload_data:/app/uploads
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  sqlite_data:
  chroma_data:
  upload_data:

networks:
  internal:
